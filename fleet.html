<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fleet — TP2 Enterprises</title>
  <link rel="icon" type="image/png" href="Zoomed.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Syne:wght@700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand: #e85d04; --brand-light: #ff7d3b;
      --dark: #080808; --dark-3: #161616;
      --border: rgba(255,255,255,0.08); --text: #e8e8f0; --text-muted: #8888a8;
    }
    html, body { background: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 40px; border-bottom: 2px solid var(--brand);
      background: rgba(8,8,8,0.95); backdrop-filter: blur(16px);
      position: sticky; top: 0; z-index: 10;
    }
    .top-logo img { height: 44px; width: auto; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, var(--brand-light), var(--brand));
      color: #fff; font-weight: 700; font-size: 0.9rem;
      padding: 10px 22px; text-decoration: none;
      clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
      text-transform: uppercase; letter-spacing: 0.08em;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .back-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(232,93,4,0.4); }
    .page-hero { text-align: center; padding: 56px 24px 40px; }
    .page-title { font-family: 'Syne', sans-serif; font-size: clamp(2.2rem, 5vw, 3.5rem); font-weight: 800; color: #fff; margin-bottom: 12px; text-transform: uppercase; }
    .page-title span { color: var(--brand-light); }
    .page-sub { font-size: 1rem; color: var(--text-muted); max-width: 500px; margin: 0 auto; }
    .empty { text-align: center; padding: 80px 24px; color: var(--text-muted); font-size: 1rem; }
  </style>
</head>
<body>
  <div class="top-bar">
    <a href="index.html" class="top-logo"><img src="Zoomed.png" alt="TP2 Enterprises" /></a>
    <a href="index.html" class="back-btn">← Back to Site</a>
  </div>
  <div class="page-hero">
    <h1 class="page-title">TP2 <span>Fleet</span></h1>
    <p class="page-sub">Private fleet management area.</p>
  </div>
  <div class="empty">Fleet content coming soon.</div>

  <canvas id="rainCanvas" style="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;"></canvas>
  <script>
    const rainCanvas = document.getElementById("rainCanvas");
    const ctx = rainCanvas.getContext("2d");
    const drops = [];
    function initCanvas() { rainCanvas.width = window.innerWidth; rainCanvas.height = window.innerHeight; }
    initCanvas();
    window.addEventListener("resize", initCanvas);
    for (let i = 0; i < 40; i++) drops.push({ x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, len: Math.random() * 80 + 40, speed: Math.random() * 1.2 + 0.4, opacity: Math.random() * 0.18 + 0.07 });
    function drawRain() {
      ctx.clearRect(0, 0, rainCanvas.width, rainCanvas.height);
      for (const d of drops) {
        const g = ctx.createLinearGradient(d.x, d.y, d.x, d.y + d.len);
        g.addColorStop(0, "rgba(255,255,255,0)");
        g.addColorStop(0.5, "rgba(255,255,255," + d.opacity + ")");
        g.addColorStop(1, "rgba(255,255,255,0)");
        ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x, d.y + d.len);
        ctx.strokeStyle = g; ctx.lineWidth = 1; ctx.stroke();
        d.y += d.speed;
        if (d.y > rainCanvas.height) { d.y = -d.len; d.x = Math.random() * window.innerWidth; }
      }
      requestAnimationFrame(drawRain);
    }
    drawRain();
  </script>
</body>
</html>
